  </g>

  <!-- Текст «Аренда чистоты» -->
  <text x="480" y="1000" class="text-brand">Аренда чистоты</text>
  
  <!-- Домен -->
  <text x="480" y="1050" class="text-domain">arenda-chistoty.ru</text>
</svg>