<?xml version="1.0" encoding="UTF-8"?>
<svg id="logo-arenda-chistoty" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 960 1100">
  <defs>
    <style>
      .dog-outline {
        fill: #00BFFF;
        stroke: #2E7D32;
        stroke-width: 10px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .dog-ear {
        fill: #ffffff;
        stroke: #2E7D32;
        stroke-width: 10px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .text-brand {
        fill: #2E7D32;
        font-family: 'Arial', 'Helvetica', sans-serif;
        font-weight: 900;
        font-size: 64px;
        text-anchor: middle;
      }
      .text-domain {
        fill: #00BFFF;
        font-family: 'Arial', 'Helvetica', sans-serif;
        font-weight: 600;
        font-size: 28px;
        text-anchor: middle;
        letter-spacing: 2px;
      }
    </style>
    <linearGradient id="animated_gradient" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00BFFF">
        <animate attributeName="stop-color" values="#00BFFF;#2E7D32;#00BFFF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#2E7D32">
        <animate attributeName="stop-color" values="#2E7D32;#00BFFF;#2E7D32" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00BFFF">
        <animate attributeName="stop-color" values="#00BFFF;#2E7D32;#00BFFF" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Собака (центр) -->
  <g transform="translate(480, 480) scale(0.9) translate(-480, -480)">
    <!-- Уши -->
    <path class="dog-ear" d="M194.68,355.85l-39.26,10.79c-15.37,4.22-25.55,16.06-25.09,29.21,1.71,49.79,7.38,166.77,23.08,173.21,19.97,8.19,48.94,16.58,48.94,16.58l-7.66-229.78Z"/>
    <path class="dog-ear" d="M765.33,355.85l39.26,10.79c15.37,4.22,25.55,16.06,25.09,29.21-1.71,49.79-7.38,166.77-23.08,173.21-19.97,8.19-48.94,16.58-48.94,16.58l7.66-229.78Z"/>

