    <ellipse cx="480" cy="451" rx="303" ry="309" fill="url(#animated_gradient)" stroke="#2E7D32" stroke-width="10"/>
    <path fill="url(#animated_gradient)" stroke="#2E7D32" stroke-width="10" d="M838.95,789.8c-2.27,2.8-4.59,5.57-6.94,8.31h0c-3.49,4.08-7.04,8.09-10.67,12.04-1.93,2.12-3.89,4.23-5.87,6.31-46.79,49.23-103.8,88.2-167.52,113.3l-.15.06c-.73.29-1.47.57-2.2.86-.06.02-.13.04-.2.07-14.7,5.69-29.76,10.64-45.13,14.81-38.38,10.44-78.69,15.99-120.27,15.99s-81.9-5.55-120.28-15.99c-15.32-4.16-30.32-9.1-44.97-14.76-.13-.05-.24-.1-.36-.14-.65-.24-1.3-.49-1.94-.75-.01-.01-.03-.01-.04-.01-.1-.04-.19-.08-.29-.12-61.77-24.33-117.26-61.69-163.22-108.81-.19-.19-.39-.39-.58-.59-2.32-2.38-4.6-4.79-6.87-7.22-.4-.43-.81-.87-1.21-1.3-6.61-7.14-13.01-14.5-19.18-22.05,0-.3.01-.61.03-.92,2.72-51.31,98.65-95.57,148.26-115.08h.01c17.38-6.85,29.08-10.65,29.08-10.65h363.13s11.7,3.8,29.08,10.65h.01c49.61,19.51,145.54,63.77,148.26,115.08.02.31.03.61.03.91Z"/>

    <!-- Морда -->
